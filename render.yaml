services:
  - type: web
    name: wikipulse-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wikipulse-db
          property: connectionString
      - key: LITE_MODE
        value: "true"

  - type: web
    name: wikipulse-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: wikipulse-backend
          property: host
          envVarKey: BACKEND_URL

databases:
  - name: wikipulse-db
    databaseName: wikipulse
    user: wiki
