services:
  - type: web
    name: wikipulse-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wikipulse-db
          property: connectionString
      - key: LITE_MODE
        value: "true"

databases:
  - name: wikipulse-db
    databaseName: wikipulse
    user: wiki
    plan: free
